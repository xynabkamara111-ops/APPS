<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ITN Campaign App - Ministry of Health</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0f2b3d, #071624);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', -apple-system, 'Helvetica Neue', sans-serif;
      padding: 20px;
    }

    /* ----- PHONE SHAPE VIEW ----- */
    .phone {
      width: 375px;
      height: 700px;
      background-color: #ffffff;
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(180, 200, 240, 0.15), 0 0 0 12px #0a1c2f;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Remove any pseudo-elements like notches */
    .phone::before,
    .phone::after {
      display: none;
      content: none;
    }

    /* ----- HEADER (DARKER BLUE) WITH CENTERED TEXT ----- */
    .app-header {
      background-color: #0a2b4e;
      flex-shrink: 0;
      width: 100%;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;    /* centers text horizontally */
      gap: 4px;
      text-align: center;     /* ensures text alignment */
    }

    .ministry-text {
      color: white;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }

    .program-text {
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
      opacity: 0.9;
      letter-spacing: 0.2px;
    }

    .campaign-text {
      color: #ffd966;
      font-weight: 800;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }

    /* ----- MAIN BODY (WHITE) - CARDS FULLY FIT THE BODY ----- */
    .app-body {
      flex: 1;
      background-color: white;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    /* 2-column grid layout that expands to fill full height */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      align-content: stretch;
    }

    /* Individual card styling - DARKER BLUE SHADE matching header */
    .card {
      background-color: #0a2b4e;
      border-radius: 24px;
      padding: 0;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      border: none;
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .card:active {
      transform: scale(0.97);
      background-color: #072040;
    }

    /* Bold text styling - white for contrast */
    .card-title {
      font-size: 1rem;
      font-weight: 800;
      color: white;
      letter-spacing: 0.5px;
      line-height: 1.4;
      text-transform: uppercase;
      word-break: keep-all;
      text-align: center;
      font-family: inherit;
      padding: 12px 8px;
      width: 100%;
    }

    @media (min-width: 360px) {
      .card-title {
        font-size: 1.05rem;
      }
    }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-3px);
        background-color: #07285c;
        box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3);
      }
    }

    /* Custom scrollbar for body */
    .app-body::-webkit-scrollbar {
      width: 4px;
    }
    .app-body::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .app-body::-webkit-scrollbar-thumb {
      background: #0a2b4e;
      border-radius: 10px;
    }

    /* ----- FOOTER (SAME DARKER BLUE SHADE) WITH TEXT ----- */
    .app-footer {
      background-color: #0a2b4e;
      flex-shrink: 0;
      width: 100%;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
    }

    .footer-copyright {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .footer-powered {
      color: #ffd966;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* responsiveness for smaller screens */
    @media (max-width: 420px) {
      .phone {
        width: 100%;
        height: 95vh;
        max-width: 380px;
        border-radius: 40px;
      }
      .app-body {
        padding: 12px;
      }
      .cards-grid {
        gap: 12px;
      }
      .card-title {
        font-size: 0.9rem;
        font-weight: 800;
        padding: 8px 6px;
      }
      .ministry-text {
        font-size: 0.75rem;
      }
      .program-text {
        font-size: 0.68rem;
      }
      .campaign-text {
        font-size: 0.72rem;
      }
      .footer-copyright, .footer-powered {
        font-size: 0.6rem;
      }
    }

    @media (min-height: 750px) {
      .cards-grid {
        gap: 18px;
      }
      .card-title {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
<div class="phone">
  <!-- HEADER: DARKER BLUE WITH CENTERED TEXT -->
  <header class="app-header">
    <div class="ministry-text">Ministry of Health</div>
    <div class="program-text">National Malaria Control Program</div>
    <div class="campaign-text">ITN Mass Campaign 2027</div>
  </header>

  <!-- BODY: WHITE BACKGROUND - 8 cards in 2 columns, FULLY FIT THE BODY -->
  <main class="app-body">
    <div class="cards-grid">
      <!-- Card 1: Household registration -->
      <div class="card" data-card="household">
        <div class="card-title">HOUSEHOLD<br>REGISTRATION</div>
      </div>
      <!-- Card 2: Distribution -->
      <div class="card" data-card="distribution">
        <div class="card-title">DISTRIBUTION</div>
      </div>
      <!-- Card 3: Monitoring -->
      <div class="card" data-card="monitoring">
        <div class="card-title">MONITORING</div>
      </div>
      <!-- Card 4: ITN Movement -->
      <div class="card" data-card="itn">
        <div class="card-title">ITN MOVEMENT</div>
      </div>
      <!-- Card 5: Stock management -->
      <div class="card" data-card="stock">
        <div class="card-title">STOCK<br>MANAGEMENT</div>
      </div>
      <!-- Card 6: Device tracking -->
      <div class="card" data-card="device">
        <div class="card-title">DEVICE TRACKING</div>
      </div>
      <!-- Card 7: Dashboard -->
      <div class="card" data-card="dashboard">
        <div class="card-title">DASHBOARD</div>
      </div>
      <!-- Card 8: Reconciliation -->
      <div class="card" data-card="reconciliation">
        <div class="card-title">RECONCILIATION</div>
      </div>
    </div>
  </main>

  <!-- FOOTER: SAME DARKER BLUE SHADE WITH REQUIRED TEXT -->
  <footer class="app-footer">
    <div class="footer-copyright">ICF-SL@2027</div>
    <div class="footer-powered">Powered by Zainab</div>
  </footer>
</div>

<script>
  // Click feedback for cards
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    card.addEventListener('click', () => {
      const titleElem = card.querySelector('.card-title');
      let cardName = titleElem ? titleElem.innerText.trim().replace(/\n/g, ' ') : 'Card';
      console.log(`[ITN Campaign] Selected: ${cardName}`);
    });
  });
</script>
</body>
</html>
