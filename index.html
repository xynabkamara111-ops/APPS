<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ITN Campaign - Ministry of Health</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0f2b3d, #071624);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', -apple-system, 'Helvetica Neue', sans-serif;
      padding: 20px;
    }

    .phone {
      width: 375px;
      height: 700px;
      background-color: #ffffff;
      border-radius: 48px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(180, 200, 240, 0.15), 0 0 0 12px #0a1c2f;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .phone::before,
    .phone::after {
      display: none;
      content: none;
    }

    .app-header {
      background-color: #0a2b4e;
      flex-shrink: 0;
      width: 100%;
      padding: 16px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .header-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 4px;
    }

    .ministry-text {
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
    }

    .program-text {
      color: white;
      font-weight: 600;
      font-size: 1rem;
      opacity: 0.9;
      letter-spacing: 0.3px;
    }

    .campaign-text {
      color: #ffd966;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .app-body {
      flex: 1;
      background-color: white;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .welcome-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: #0a2b4e;
      margin-bottom: 4px;
    }

    .sub-text {
      font-size: 0.7rem;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 6px;
    }

    .required::after {
      content: " *";
      color: #e53e3e;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
      background: white;
    }

    input:focus {
      border-color: #0a2b4e;
      box-shadow: 0 0 0 3px rgba(10, 43, 78, 0.1);
    }

    .login-btn {
      background-color: #0a2b4e;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
      margin-top: 12px;
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .error-message {
      background-color: #fee2e2;
      color: #b91c1c;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      margin-top: 16px;
      text-align: center;
      display: none;
    }

    .cards-container {
      display: none;
      flex-direction: column;
      flex: 1;
      height: 100%;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex: 1;
      align-content: stretch;
      margin-bottom: 16px;
    }

    /* When only one card is shown, make it full width and full height */
    .cards-grid:has(.card:only-child) {
      grid-template-columns: 1fr;
    }

    .cards-grid:has(.card:only-child) .card {
      min-height: 400px;
      height: 100%;
    }

    .card {
      background-color: #0a2b4e;
      border-radius: 24px;
      padding: 0;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
      border: none;
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .card:active {
      transform: scale(0.97);
      background-color: #072040;
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      letter-spacing: 0.5px;
      line-height: 1.4;
      text-transform: uppercase;
      word-break: keep-all;
      text-align: center;
      font-family: inherit;
      padding: 20px 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (min-width: 360px) {
      .card-title {
        font-size: 2rem;
      }
    }

    /* When only one card, increase title size further */
    .cards-grid:has(.card:only-child) .card-title {
      font-size: 2.5rem;
    }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-3px);
        background-color: #07285c;
        box-shadow: 0 14px 24px rgba(0, 0, 0, 0.3);
      }
    }

    .logout-btn-container {
      display: flex;
      justify-content: flex-start;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .logout-btn {
      background-color: #dc2626;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      width: auto;
      transition: 0.2s;
    }

    .logout-btn:active {
      transform: scale(0.97);
    }

    .app-body::-webkit-scrollbar {
      width: 4px;
    }
    .app-body::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .app-body::-webkit-scrollbar-thumb {
      background: #0a2b4e;
      border-radius: 10px;
    }

    .app-footer {
      background-color: #0a2b4e;
      flex-shrink: 0;
      width: 100%;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    .footer-copyright {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .footer-powered {
      color: #ffd966;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    @media (max-width: 420px) {
      .phone {
        width: 100%;
        height: 95vh;
        max-width: 380px;
        border-radius: 40px;
      }
      .app-body {
        padding: 12px;
      }
      .cards-grid {
        gap: 12px;
      }
      .card-title {
        font-size: 1.5rem;
        padding: 12px 8px;
      }
      .cards-grid:has(.card:only-child) .card-title {
        font-size: 2rem;
      }
      .ministry-text {
        font-size: 1rem;
      }
      .program-text {
        font-size: 0.85rem;
      }
      .campaign-text {
        font-size: 0.85rem;
      }
      .app-header {
        padding: 12px 12px;
      }
      .logout-btn {
        padding: 8px 16px;
        font-size: 0.7rem;
      }
      .app-footer {
        padding: 16px 12px;
      }
      .footer-copyright {
        font-size: 0.75rem;
      }
      .footer-powered {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div class="phone">
  <header class="app-header">
    <div class="header-center">
      <div class="ministry-text">Ministry of Health</div>
      <div class="program-text">National Malaria Control Program</div>
      <div class="campaign-text">ITN Mass Campaign 2027</div>
    </div>
  </header>

  <main class="app-body">
    <!-- Login Section -->
    <div id="loginSection" class="login-container">
      <div class="logo-area">
        <div class="welcome-text">Welcome Back</div>
        <div class="sub-text">Sign in to continue</div>
      </div>

      <div class="form-group">
        <label class="required">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="required">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button class="login-btn" id="loginBtn">🔐 Login</button>

      <div class="error-message" id="errorMsg">
        ❌ Invalid username or password
      </div>
    </div>

    <!-- Cards Dashboard Section (Hidden until login) -->
    <div id="cardsSection" class="cards-container">
      <div class="cards-grid" id="cardsGrid">
        <!-- Cards will be dynamically populated based on user role -->
      </div>
      
      <div class="logout-btn-container">
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-copyright">ICF-SL@2027</div>
    <div class="footer-powered">Powered by Zainab</div>
  </footer>
</div>

<script>
  // ========== CREDENTIALS DATABASE (CSV format) ==========
  // Username,Password,Role,Pages (comma-separated page names without .html)
  const credentialsCSV = `Username,Password,Role,Pages
User_001,HHR_123,Household Registrar,reg
User_002,Dist_123,Distribution Officer,dist
User_003,NM_123,Navigation Manager,mon,recc,dash
User_004,TA_123,Tech Assistant,mon,recc,dash
User_005,DHMT_123,District Health Team,mon,recc,dvt,dash
User_006,ITNMOV_123,ITN Movement Officer,itnmov
User_007,stm_123,Stock Manager,stm
User_008,stm_123,Stock & Device Manager,stm,dvt`;

  // Parse CSV to array of user objects
  function parseCSV(csvText) {
    const lines = csvText.trim().split('\n');
    const headers = lines[0].split(',');
    const users = [];
    
    for (let i = 1; i < lines.length; i++) {
      const values = lines[i].split(',');
      const user = {};
      for (let j = 0; j < headers.length; j++) {
        user[headers[j].trim()] = values[j] ? values[j].trim() : '';
      }
      // Parse pages - handle multiple pages per user
      if (user.Pages) {
        user.pagesArray = user.Pages.split(',').map(p => p.trim() + '.html');
      } else {
        user.pagesArray = [];
      }
      users.push(user);
    }
    return users;
  }

  // Load credentials
  const users = parseCSV(credentialsCSV);

  // Card definitions - each card links to a specific HTML page
  // These correspond to the 8 required pages: reg.html, dist.html, mon.html, itnmov.html, stm.html, dvt.html, dash.html, recc.html
  const allCards = [
    { id: "household", title: "HOUSEHOLD<br>REGISTRATION", page: "reg.html" },
    { id: "distribution", title: "DISTRIBUTION", page: "dist.html" },
    { id: "monitoring", title: "MONITORING", page: "mon.html" },
    { id: "itnmov", title: "ITN MOVEMENT", page: "itnmov.html" },
    { id: "stock", title: "STOCK<br>MANAGEMENT", page: "stm.html" },
    { id: "device", title: "DEVICE TRACKING", page: "dvt.html" },
    { id: "dashboard", title: "DASHBOARD", page: "dash.html" },
    { id: "reconciliation", title: "RECONCILIATION", page: "recc.html" }
  ];

  // DOM Elements
  const loginSection = document.getElementById('loginSection');
  const cardsSection = document.getElementById('cardsSection');
  const cardsGrid = document.getElementById('cardsGrid');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const errorMsgDiv = document.getElementById('errorMsg');

  let currentUser = null;

  // Function to render cards based on user's allowed pages
  function renderCardsForUser(user) {
    if (!user || !user.pagesArray) {
      cardsGrid.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">No modules assigned to this user</div>';
      return;
    }
    
    const allowedPages = user.pagesArray;
    const allowedCards = allCards.filter(card => allowedPages.includes(card.page));
    
    if (allowedCards.length === 0) {
      cardsGrid.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">No modules assigned to this user</div>';
      return;
    }
    
    cardsGrid.innerHTML = '';
    allowedCards.forEach(card => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'card';
      cardDiv.setAttribute('data-card', card.id);
      cardDiv.setAttribute('data-page', card.page);
      cardDiv.innerHTML = `<div class="card-title">${card.title}</div>`;
      cardDiv.addEventListener('click', () => {
        console.log(`[ITN Campaign] Navigating to: ${card.page}`);
        window.location.href = card.page;
      });
      cardsGrid.appendChild(cardDiv);
    });
  }

  // Function to show cards and hide login
  function showCards(user) {
    currentUser = user;
    renderCardsForUser(user);
    loginSection.style.display = 'none';
    cardsSection.style.display = 'flex';
    localStorage.setItem('itn_logged_in', 'true');
    localStorage.setItem('itn_username', user.Username);
  }

  // Function to show login and hide cards
  function showLogin() {
    loginSection.style.display = 'flex';
    cardsSection.style.display = 'none';
    currentUser = null;
    localStorage.setItem('itn_logged_in', 'false');
    localStorage.removeItem('itn_username');
    usernameInput.value = '';
    passwordInput.value = '';
    errorMsgDiv.style.display = 'none';
  }

  // Handle login - validate against CSV credentials
  function handleLogin() {
    const enteredUsername = usernameInput.value.trim();
    const enteredPassword = passwordInput.value.trim();

    errorMsgDiv.style.display = 'none';

    if (!enteredUsername || !enteredPassword) {
      errorMsgDiv.textContent = "❌ Please enter both username and password";
      errorMsgDiv.style.display = 'block';
      return;
    }

    // Find user in credentials
    const matchedUser = users.find(u => u.Username === enteredUsername && u.Password === enteredPassword);
    
    if (matchedUser) {
      showCards(matchedUser);
    } else {
      errorMsgDiv.textContent = "❌ Invalid username or password. Please try again.";
      errorMsgDiv.style.display = 'block';
      passwordInput.value = '';
      passwordInput.focus();
    }
  }

  // Handle logout
  function handleLogout() {
    showLogin();
  }

  // Check if user is already logged in
  function checkLoginState() {
    const isLoggedIn = localStorage.getItem('itn_logged_in');
    const savedUsername = localStorage.getItem('itn_username');
    
    if (isLoggedIn === 'true' && savedUsername) {
      const savedUser = users.find(u => u.Username === savedUsername);
      if (savedUser) {
        showCards(savedUser);
        return;
      }
    }
    showLogin();
  }

  // Event listeners
  loginBtn.addEventListener('click', handleLogin);
  logoutBtn.addEventListener('click', handleLogout);

  // Enter key press for login
  function onEnterPress(event) {
    if (event.key === 'Enter') {
      event.preventDefault();
      handleLogin();
    }
  }
  usernameInput.addEventListener('keypress', onEnterPress);
  passwordInput.addEventListener('keypress', onEnterPress);

  // Initialize
  checkLoginState();
</script>
</body>
</html>
